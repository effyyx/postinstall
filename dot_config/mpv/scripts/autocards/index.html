<!DOCTYPE html>
<head>
  <meta charset="UTF-8" />
  <title>Autocards</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Kept Inter for UI elements; removed Shippori Mincho -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet">
  <script>
    function pushLine(frag, text, tsStr) {
      const containerElm = document.createElement('div');
      containerElm.hidden = true;
      frag.appendChild(containerElm);
      const timeElm = document.createElement('p');
      timeElm.textContent = tsStr;
      containerElm.appendChild(timeElm);
      const lineElm = document.createElement('div');
      containerElm.appendChild(lineElm);
      const textElm = document.createElement('span');
      textElm.innerHTML = text;
      lineElm.appendChild(textElm);
    }
    function bisectLeft(a, v) {
      let lo = 0, hi = a.length;
      while (lo < hi) {
        const mid = (lo + hi) >> 1;
        if (a[mid] < v)
          lo = mid + 1;
        else
          hi = mid;
      }
      return lo;
    }
    let activeIndicatorElm;
    let linesContainerElm;
    let linesElm;
    let blankElm;
    let deckElm;
    let sentenceElm;
    let expressionElm;
    let pictureElm;
    let audioElm;
    let prevLinesElm;
    let nextLinesElm;
    function init() {
      activeIndicatorElm = document.querySelector('.active-indicator');
      linesContainerElm = document.querySelector('.lines-container');
      linesElm = document.querySelector('.lines');
      blankElm = document.querySelector('.blank');
      deckElm = document.getElementById('field-deck');
      sentenceElm = document.getElementById('field-sentence');
      expressionElm = document.getElementById('field-expression');
      pictureElm = document.getElementById('field-picture');
      audioElm = document.getElementById('field-audio');
      prevLinesElm = document.getElementById('field-prev-lines');
      nextLinesElm = document.getElementById('field-next-lines');
    }
    function setActive(newActive) {
      if (active === newActive)
        return;
      activeIndicatorElm.style.backgroundColor = newActive ? 'var(--color-green-500)' : 'var(--color-red-500)';
      active = newActive;
    }
    function setHidden(lo, hi, hidden) {
      Array.prototype.slice.call(linesElm.children, lo, hi).forEach((elm) => {
        if (hidden)
          elm.hidden = true;
        else
          elm.removeAttribute('hidden');
      });
    }
    function scrollInfo(elm) {
      const sh = elm.scrollHeight;
      const st = elm.scrollTop;
      const oh = elm.offsetHeight;
      return oh === 0 || st === sh - oh;
    }
    let subId;
    let times = [];
    let idx;
    function updateLines(t) {
      const newIdx = bisectLeft(times, t);
      const atBottom = scrollInfo(linesContainerElm);
      let hidden = idx > newIdx, lo = Math.min(newIdx, idx), hi = Math.max(newIdx, idx);
      setHidden(lo, hi, hidden);
      const last = hi - 1;
      if (idx === 0 || lo != hi && atBottom)
        blankElm.scrollIntoView({ behavior: hi - lo > 10 ? 'instant' : 'smooth', block: 'end' });
      idx = newIdx;
    }
    function update() {
      if (document.hidden)
        return;
      fetch('/update')
        .then(r => r.json())
        .then(([id, t]) => {
          setActive(true);
          if (subId !== id) {
            readLines();
            return;
          }
          updateLines(t);
        })
        .catch(() => setActive(false));
    }
    function check() {
      if (document.hidden)
        return;
      fetch('/check', { method: 'POST' });
    }
    const DELIM_REGEX = /(「|」|『|』|\"|\'|\.|!|\?|．|。|…|︒|！|？|︙|\n)/g;
    let active = false;
    let updateInterval;
    let checkInterval;
    function readLines() {
      if (updateInterval)
        clearInterval(updateInterval);
      if (checkInterval)
        clearInterval(checkInterval);
      fetch('/lines')
        .then(r => r.json())
        .then(({ id, lines }) => {
          setActive(true);
          subId = id;
          const frag = document.createDocumentFragment();
          times = lines.map(([text, ts, tsStr, _a, _b]) => {
            pushLine(frag, text.map(s => s.replace(DELIM_REGEX, '<span style="--s: \'\\$1\'"></span>')).join('<span class="nl"></span>'), tsStr);
            return ts;
          });
          idx = 0;
          linesElm.innerHTML = '';
          linesElm.appendChild(frag);
          updateInterval = setInterval(update, 250);
          checkInterval = setInterval(check, 1500);
        });
    }
    function onLoad() {
      init();
      fetch('/options')
        .then(r => r.json())
        .then(opts => {
          if (!opts.deck) {
            const settings = document.getElementById('settings');
            settings.showPopover();
          } else {
            deckElm.value = opts.deck;
            sentenceElm.value = opts.sentence;
            expressionElm.value = opts.expression;
            pictureElm.value = opts.picture;
            audioElm.value = opts.audio;
            prevLinesElm.value = opts.prev_lines || 0;
            nextLinesElm.value = opts.next_lines || 0;
          }
        });
      readLines();
    }
    function updateOptions() {
      fetch('/options', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          deck: deckElm.value,
          sentence: sentenceElm.value,
          expression: expressionElm.value,
          picture: pictureElm.value,
          audio: audioElm.value,
          prev_lines: parseInt(prevLinesElm.value) || 0,
          next_lines: parseInt(nextLinesElm.value) || 0,
        })
      });
    }
    function toggleAnim() {
      const style = window.universal.style;
      const b = style.transitionProperty === '';
      style.transitionProperty = b ? 'color, background-color, border-color, text-decoration-color, fill, stroke' : '';
      style.transitionTimingFunction = b ? 'cubic-bezier(0.4, 0, 0.2, 1)' : '';
      style.transitionDuration = b ? '150ms' : '';
    }
    function toggleTheme() {
      toggleAnim();
      const style = document.documentElement.style;
      let colorScheme = style.getPropertyValue('color-scheme');
      if (colorScheme === '') {
        if (window.matchMedia('(prefers-color-scheme: dark)').matches)
          colorScheme = 'dark';
        else
          colorScheme = 'light';
      }
      style.setProperty('color-scheme', colorScheme === 'dark' ? 'light' : 'dark');
      setTimeout(toggleAnim, 0);
    }
    (function () {
      const style = document.querySelector('head').appendChild(document.createElement('style'));
      const styleSheet = document.styleSheets[document.styleSheets.length - 1];
      styleSheet.insertRule("* {}", 0);
      window.universal = styleSheet.cssRules[0];
      toggleAnim();
    })();
  </script>
  <style>
  :root {
    color-scheme: light dark;
    --color-red-500: oklch(0.637 0.237 25.331);
    --color-green-500: oklch(0.723 0.219 149.579);
    --cb: light-dark(white, black);
    --cf: light-dark(black, white);
    --c1: light-dark(hsl(0, 0%, 90%), hsl(0, 0%, 10%));
    --c2: light-dark(hsl(0, 0%, 80%), hsl(0, 0%, 20%));
    --c3: light-dark(hsl(0, 0%, 70%), hsl(0, 0%, 30%));
    --c4: light-dark(hsl(0, 0%, 60%), hsl(0, 0%, 40%));
    --c5: hsl(0, 0%, 50%);
    font-family: "ヒラギノ角ゴ Pro W3", "Hiragino Kaku Gothic Pro", Osaka, "メイリオ", Meiryo, "ＭＳ Ｐゴシック", "MS PGothic", sans-serif;
    font-optical-sizing: auto;
    font-style: normal;
  }
  .notransition {
    transition: none !important;
  }
  ::-webkit-scrollbar {
    width: 0.3rem;
    height: 0.3rem;
  }
  ::-webkit-scrollbar-thumb {
    background: var(--c2);
    /* border-radius removed below */
  }
  ::-webkit-scrollbar-track {
    background: var(--c0);
    /* border-radius removed below */
  }
  body {
    background: var(--cb);
    color: var(--cf);
    margin: 0;
    height: 100vh;
    overflow-y: hidden;
    display: flex;
    flex-direction: column;
  }
  .header-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-block: 0.5rem;
    padding-inline: 2rem;
  }
  .lines-container {
    overflow-y: auto;
    scrollbar-gutter: stable;
    height: 100%;
  }
  .lines {
    display: flex;
    flex-direction: column;
    max-width: 80rem;
    justify-self: center;
    margin: auto;
    padding-inline: 3rem;
    margin-bottom: 1.5rem;
    gap: 1.25rem;
  }
  .lines>div>p {
    margin-top: 0;
    margin-bottom: 0.35rem;
    font-size: 0.8rem;
    color: var(--c5);
    width: 100%;
  }
  .lines>div>div {
    font-family: "ヒラギノ角ゴ Pro W3", "Hiragino Kaku Gothic Pro", Osaka, "メイリオ", Meiryo, "ＭＳ Ｐゴシック", "MS PGothic", sans-serif;
    max-width: 100%;
    font-size: 1.4rem;
    border: 2px solid var(--c2);
    /* border-radius: 0.75rem; → removed */
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .lines>div>div>span {
    padding: 0.5rem;
  }
  .lines>div>div>span > span::after {
    content: var(--s);
  }
  .lines>div>div>span > .nl::after {
    content: '\a';
    white-space: pre;
  }
  .blank {
    height: 50%;
  }
  .shill {
    position: absolute;
    bottom: 0rem;
    background-color: var(--cb);
    width: 100%;
    box-sizing: border-box;
    padding-left: 1rem;
    padding-bottom: 0.25rem;
    font-size: x-small;
    font-weight: 500;
    color: var(--c4);
    font-family: 'Inter';
    right: 0.5rem;
  }
  .title {
    font-size: x-large;
  }
  .header-options>button {
    width: 2.25rem;
    height: 2.25rem;
    aspect-ratio: 1;
    border: 0;
    /* border-radius: 0.75rem; → removed */
    padding: 0.45rem;
    background-color: transparent;
    display: flex;
    align-content: center;
  }
  .header-options>button:hover {
    background-color: var(--c1);
  }
  .active-indicator {
    background-color: var(--color-red-500);
    aspect-ratio: 1;
    width: auto;
    height: 60%;
    /* border-radius: 0.5rem; → removed */
    margin-left: 1rem;
  }
  button:hover {
    cursor: pointer;
  }
  #settings {
    position: absolute;
    width: 50%;
    height: fit-content;
    max-width: 48rem;
    left: 0px;
    right: 0px;
    top: 0px;
    bottom: 0px;
    margin-inline: auto;
    margin-block: auto;
    background-color: var(--cb);
    /* border-radius: 1.5rem; → removed */
    border: solid 2px var(--c1);
    z-index: 10;
    padding: 1.5rem;
  }
  #settings>div {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100%;
    gap: 1.5rem;
  }
  #settings>div>div {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  #settings>div>div>span {
    font-weight: 500;
    font-size: medium;
  }
  #settings>div>div>input {
    font-size: large;
    background-color: transparent;
    border: 0;
    padding-inline: 1rem;
    padding-block: 0.5rem;
    /* border-radius: 0.5rem; → removed */
    font-family: monospace;
  }
  #settings>div>div>input:focus {
    outline: none;
  }
  #settings>div>div>input,
  textarea {
    background-color: var(--c1);
  }
  #settings>div>button {
    border: 0;
    /* border-radius: 0.75rem; → removed */
    padding: 0.5rem;
    background-color: transparent;
    font-size: large;
    font-weight: 500;
    text-align: center;
    margin-top: 1.5rem;
  }
  #settings>div>button:hover {
    background-color: var(--c1);
  }

  /* Explicitly force zero radius everywhere we had it before */
  .lines > div > div,
  .header-options > button,
  #settings,
  #settings button,
  ::-webkit-scrollbar-thumb,
  ::-webkit-scrollbar-track {
    border-radius: 0 !important;
  }
</style>
</head>
<body onload="onLoad()">
  <div class="header-container">
    <span class="title">
      Autocards
    </span>
    <div class="header-options" style="display: flex; align-items: center; gap: 1rem; height: 100%;">
      <button onclick="toggleTheme()">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          class="lucide lucide-sun-moon">
          <path d="M12 8a2.83 2.83 0 0 0 4 4 4 4 0 1 1-4-4" />
          <path d="M12 2v2" />
          <path d="M12 20v2" />
          <path d="m4.9 4.9 1.4 1.4" />
          <path d="m17.7 17.7 1.4 1.4" />
          <path d="M2 12h2" />
          <path d="M20 12h2" />
          <path d="m6.3 17.7-1.4 1.4" />
          <path d="m19.1 4.9-1.4 1.4" />
        </svg>
      </button>
      <button popovertarget="settings" style="color: light-dark(black, white)">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-settings">
          <path
            d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l-.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l-.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />
          <circle cx="12" cy="12" r="3" />
        </svg>
      </button>
      <div class="active-indicator"></div>
    </div>
  </div>
  <div class="lines-container">
    <div class="lines"></div>
    <div class="blank"></div>
    <div class="shill">Made with &hearts; by かにふぁん</div>
  </div>
  <div id="settings" popover>
    <div>
      <div>
        <span>Mining Deck</span>
        <input id="field-deck" autocomplete="off"></input>
      </div>
      <div>
        <span>Sentence Field</span>
        <input id="field-sentence" autocomplete="off"></input>
      </div>
      <div>
        <span>Expression Field</span>
        <input id="field-expression" autocomplete="off"></input>
      </div>
      <div>
        <span>Picture Field</span>
        <input id="field-picture" autocomplete="off"></input>
      </div>
      <div>
        <span>Sentence Audio Field</span>
        <input id="field-audio" autocomplete="off"></input>
      </div>
      <div>
        <span>Previous Sentences</span>
        <input id="field-prev-lines" type="number" min="0" autocomplete="off"></input>
      </div>
      <div>
        <span>Next Sentences</span>
        <input id="field-next-lines" type="number" min="0" autocomplete="off"></input>
      </div>
      <button popovertarget="settings" onclick="updateOptions()">Update</button>
    </div>
  </div>
</body>
</html>
