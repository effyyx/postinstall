#
# Please note not all available settings / options are set here.
# For a full list, see the wiki
#

#Defaults
$mainMod = SUPER
$term = ghostty
$file = thunar
$editor = nvim
$browser = firefox

monitor = DP-1, 2560x1440@165, 0x0, 1
monitor = DP-2, 1920x1080@144, 2560x0, 1
#monitor = HDMI-A-1, 1920x1080@60, 0x0, 1


#Env

env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = __GL_VRR_ALLOWED,1
env = WLR_DRM_NO_ATOMIC,1
env = MOZ_ENABLE_WAYLAND,1



# ## Idle configuration
#
# Source a file (multi-file configs)
source = ~/.config/hypr/colors.conf
# ## Input configuration

input {
    #kb_layout = us,ru
    kb_layout = us
    kb_variant =
    kb_model =
    #kb_options = grp:caps_toggle,grp_led:caps,altwin:swap_alt_win,ctrl:rctrl_ralt
    kb_options =
    kb_rules =

    follow_mouse = 1 # 0|1|2|3
    float_switch_override_focus = 2

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

general {
    gaps_in = 3
    gaps_out = 5
    border_size = 1
    col.active_border = $primary
    col.inactive_border = rgba(595959aa)

    layout = dwindle # master|dwindle

}

decoration {
    active_opacity = 1.0
    inactive_opacity = 1.0
    fullscreen_opacity = 1.0

    rounding = 0
    blur {
        enabled = true
        size = 3
        passes = 4 # more passes = more resource intensive.
        new_optimizations = true
        xray = true
        ignore_opacity = false
    }
    shadow {
        enabled = false
    }
}



cursor {
    no_hardware_cursors = true
}

# Blur for waybar
#blurls = waybar

xwayland {
    force_zero_scaling = true
}

animations {
    enabled = no
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    force_split = 0
    special_scale_factor = 0.8
    split_width_multiplier = 1.0
    use_active_for_splits = true
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
    special_scale_factor = 0.8
}

misc {
    #disable_autoreload = true
    disable_hyprland_logo = true
    always_follow_on_dnd = true
    layers_hog_keyboard_focus = true
    animate_manual_resizes = false
    enable_swallow = true
    swallow_regex =
    focus_on_activate = false
    vfr = 1
}

gesture = 3, horizontal, workspace
gesture = 3, down, mod: ALT, close
gesture = 3, up, mod: SUPER, scale: 1.5, fullscreen

# Window/Sessions actions
bind = $mainMod, Q, killactive, # close active window
bind = $mainMod, Delete, exit, # kill hyprland Session
bind = $mainMod+Shift, F, toggleFloating, # toggle floating
bind = $mainMod, F, fullscreen, toggle # toggle fullscreen
bind = $mainMod, L, exec, hyprlock #hyprlock
bind = $mainMod+Shift, Q, exec, hyprctl kill

# Application shortcuts
bind = $mainMod, Space, exec, $term # Launch terminal
bind = $mainMod+Alt, N, exec, $file # Launch thunar
bind = $mainMod, N, exec, $term -e yazi # Launch yazi
bind = $mainMod, w, exec, $browser # Launch web browser
bind = $mainMod, e, exec, $term -e rmpc # Launch rmpc
bind = $mainMod, a, exec, anki

# Move focus with mainMod + arrow keys
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Volume Control
bindle = CTRL, right, exec, playerctl next
bindle = CTRL, left, exec, playerctl previous
bindle = CTRL, up, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindle = CTRL, down, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindle = CTRL, m, exec, wpctl set-mute @DEFAULT_SINK@ toggle
bindle = CTRL, p, exec, playerctl play-pause

# Workspaces To Monitor
workspace = 1, monitor:DP-1
workspace = 2, monitor:DP-1
workspace = 3, monitor:DP-1, layout:scrolling
workspace = 4, monitor:DP-2
workspace = 5, monitor:DP-2
workspace = 6, monitor:DP-2, layout:scrolling

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6

bind = $mainMod SHIFT,left ,movewindow, l
bind = $mainMod SHIFT,right ,movewindow, r
bind = $mainMod SHIFT,up ,movewindow, u
bind = $mainMod SHIFT,down ,movewindow, d

# Move active window to a workspace with mainMod + CTRL + [0-9]
bind = $mainMod CTRL, 1, movetoworkspace, 1
bind = $mainMod CTRL, 2, movetoworkspace, 2
bind = $mainMod CTRL, 3, movetoworkspace, 3
bind = $mainMod CTRL, 4, movetoworkspace, 4
bind = $mainMod CTRL, 5, movetoworkspace, 5
bind = $mainMod CTRL, 6, movetoworkspace, 6

# same as above, but doesnt switch to the workspace
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, layoutmsg, move +col
bind = $mainMod, mouse_up, layoutmsg, move -col

binds {
     workspace_back_and_forth = 1
     allow_workspace_cycles = 1
}
bind = $mainMod,slash,workspace,previous

bind = $mainMod,R,submap,resize
submap = resize
binde =,right,resizeactive,15 0
binde =,left,resizeactive,-15 0
binde =,up,resizeactive,0 -15
binde =,down,resizeactive,0 15
binde =,l,resizeactive,15 0
binde =,h,resizeactive,-15 0
binde =,k,resizeactive,0 -15
binde =,j,resizeactive,0 15
bind =,escape,submap,reset
submap = reset

bind=CTRL SHIFT, left, resizeactive,-15 0
bind=CTRL SHIFT, right, resizeactive,15 0
bind=CTRL SHIFT, up, resizeactive,0 -15
bind=CTRL SHIFT, down, resizeactive,0 15
bind=CTRL SHIFT, l, resizeactive, 15 0
bind=CTRL SHIFT, h, resizeactive,-15 0
bind=CTRL SHIFT, k, resizeactive, 0 -15
bind=CTRL SHIFT, j, resizeactive, 0 15

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Zoom
bind = , mouse:276, exec, ~/.config/hypr/scripts/zoom.sh increase 0.3
bind = , mouse:275, exec, ~/.config/hypr/scripts/zoom.sh decrease 0.3

# Color Picker
bindd = Super+Alt, C, Color picker, exec, hyprpicker -a # Pick color (Hex) >> clipboard

# Quickshell
bind = $mainMod CTRL, R, exec, killall quickshell; quickshell &
# Menu tabs
bind = $mainMod, m, exec, qs ipc call menu toggle
bind = $mainMod, Return, exec, qs ipc call launcher toggle
bind = $mainMod SHIFT, R, exec, qs ipc call menu recorder
bind = $mainMod SHIFT, S, exec, qs ipc call menu screenshot
bind = $mainMod SHIFT, N, exec, qs ipc call menu notifications
bind = $mainMod SHIFT, P, exec, qs ipc call music toggle
bind = $mainMod SHIFT, C, exec, qs ipc call calendar toggle
bind = $mainMod SHIFT, slash, exec, qs ipc call cheatsheet toggle
# Screenshot
bind = , F1, exec, qs ipc call screenshot region
bind = , F2, exec, qs ipc call screenshot take
bind = $mainMod SHIFT, O, exec, qs ipc call screenshot ocr
bind = $mainMod SHIFT, M, exec, qs ipc call screenshot mangaOcr
bind = $mainMod SHIFT, A, exec, qs ipc call screenshot annotate
# Recording
bind = SUPER ALT, R, exec, qs ipc call recorder regionRecord
bind = SUPER ALT, E, exec, qs ipc call recorder regionRecordAudio
bind = SUPER ALT, A, exec, qs ipc call recorder fullscreenRecord
bind = SUPER ALT, S, exec, qs ipc call recorder fullscreenRecordAudio

# Opacity
bind = SUPER, T, exec, ~/.config/hypr/scripts/opacity.sh
#------------#
# auto start #
#------------#
exec-once = hypridle &
exec-once = swww-daemon &
exec-once = quickshell &
exec-once = fcitx5 -d &
exec-once = mpd &
exec-once = mpDris2 &
exec-once = bash -c "mkfifo /tmp/$HYPRLAND_INSTANCE_SIGNATURE.wob && tail -f /tmp/$HYPRLAND_INSTANCE_SIGNATURE.wob | wob & disown" &
exec-once = /usr/lib/polkit-kde-authentication-agent-1 &
# Slow app launch fix
exec-once = systemctl --user import-environment &
exec-once = hash dbus-update-activation-environment 2>/dev/null &
exec-once = dbus-update-activation-environment --systemd &
exec-once = xdg-desktop-portal-hyprland &
exec-once = systemctl --user start plasma-polkit-agent
exec-once = wl-clip-persist --clipboard regular

# Disable blur for xwayland context menus
#windowrule = match:class ^()$, match:title ^()$, no_blur on

# Disable blur for every window
windowrule = match:class .*, no_blur on

# Float Necessary Windows
windowrule = match:title ^(Open File)(.*)$, center on
windowrule = match:title ^(Open File)(.*)$, float on
windowrule = match:title ^(Select a File)(.*)$, center on
windowrule = match:title ^(Select a File)(.*)$, float on
windowrule = match:title ^(Choose wallpaper)(.*)$, center on
windowrule = match:title ^(Choose wallpaper)(.*)$, float on
windowrule = match:title ^(Choose wallpaper)(.*)$, size (monitor_w*.60) (monitor_h*.65)
windowrule = match:title ^(Open Folder)(.*)$, center on
windowrule = match:title ^(Open Folder)(.*)$, float on
windowrule = match:title ^(Save As)(.*)$, center on
windowrule = match:title ^(Save As)(.*)$, float on
windowrule = match:title ^(Library)(.*)$, center on
windowrule = match:title ^(Library)(.*)$, float on
windowrule = match:title ^(File Upload)(.*)$, center on
windowrule = match:title ^(File Upload)(.*)$, float on
windowrule = match:title ^(.*)(wants to save)$, center on
windowrule = match:title ^(.*)(wants to save)$, float on
windowrule = match:title ^(.*)(wants to open)$, center on
windowrule = match:title ^(.*)(wants to open)$, float on
windowrule = match:class ^(pavucontrol)$, float on
windowrule = match:class ^(pavucontrol)$, size (monitor_w*.45) (monitor_h*.45)
windowrule = match:class ^(pavucontrol)$, center on
windowrule = match:class ^(org.pulseaudio.pavucontrol)$, float on
windowrule = match:class ^(org.pulseaudio.pavucontrol)$, size (monitor_w*.45) (monitor_h*.45)
windowrule = match:class ^(org.pulseaudio.pavucontrol)$, center on
windowrule = match:class ^brave$ match:title ^Save File$, float 1
windowrule = match:class ^brave$ match:title ^Open File$, float 1
windowrule = match:class ^LibreWolf$ match:title ^Picture-in-Picture$, float 1
windowrule = match:class ^blueman-manager$, float 1
windowrule = match:class ^xdg-desktop-portal-gtk$, float 1
windowrule = match:class ^xdg-desktop-portal-kde$, float 1
windowrule = match:class ^xdg-desktop-portal-hyprland$, float 1
windowrule = match:class ^org.kde.polkit-kde-authentication-agent-1$, float 1
windowrule = match:class ^CachyOSHello$, float 1
windowrule = match:class ^zenity$, float 1
windowrule = match:title ^Steam - Self Updater$, float 1
windowrule = match:class org.freedesktop.impl.portal.desktop.kde, float on
windowrule = match:class org.freedesktop.impl.portal.desktop.kde, size (monitor_w*.60) (monitor_h*.65)

# Picture-in-Picture
windowrule = match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$, float on
windowrule = match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$, keep_aspect_ratio on
windowrule = match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$, move (monitor_w*.73) (monitor_h*.72)
windowrule = match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$, size (monitor_w*.25) (monitor_h*.25)
windowrule = match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$, float on
windowrule = match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$, pin on

# --- Tearing ---
windowrule = match:title .*\.exe, immediate on
windowrule = match:title .*minecraft.*, immediate on
windowrule = match:class ^(steam_app).*, immediate on

# imv, mpv, nemo, ncmpcpp
windowrule = match:class ^imv$, float 1; size 960 540; move 25% 0
windowrule = match:class ^mpv$, float 1; size 960 540; move 25% 0
windowrule = match:class ^nemo$, float 1; size 960 540; move 25% 0
windowrule = match:class ^ncmpcpp$, float 1; size 960 540; move 25% 0
# anki
windowrule = match:class ^anki$, float 1
# Specific Fixes
windowrule = match:class ^firefox$, no_blur 1
windowrule = match:class ^discord$, no_screen_share 1

# Quickshell Blurs
layerrule = blur on, match:namespace qs-menu
layerrule = xray on, match:namespace qs-menu
layerrule = blur on, match:namespace qs-cheatsheet
layerrule = xray on, match:namespace qs-cheatsheet

# steam games
windowrule = float on, fullscreen on, border_size 0, match:class (steam_app.*)

# Awakened PoE Trade
windowrule {
    name = apt
    match:class = awakened-poe-trade
    float = on
    no_blur = on
    no_shadow = on
    border_size = 0
}

# keybinds (use whatever you have set in the app)
bind = SHIFT, Space, pass, class:awakened-poe-trade
bind = CTRL ALT, D, pass, class:awakened-poe-trade
