colourful: false

filekinds:
  normal:       {foreground: "#d3c2c9"}
  directory:    {foreground: "#fbb1d8"}
  symlink:      {foreground: "#f3ba9c"}
  pipe:         {foreground: "#9c8d93"}
  block_device: {foreground: "#9c8d93"}
  char_device:  {foreground: "#9c8d93"}
  socket:       {foreground: "#9c8d93"}
  special:      {foreground: "#dfbecd"}
  executable:   {foreground: "#f3ba9c"}
  mount_point:  {foreground: "#fbb1d8"}

perms:
  user_read:          {foreground: "#9c8d93"}
  user_write:         {foreground: "#dfbecd"}
  user_execute_file:  {foreground: "#f3ba9c"}
  user_execute_other: {foreground: "#f3ba9c"}
  group_read:         {foreground: "#9c8d93"}
  group_write:        {foreground: "#dfbecd"}
  group_execute:      {foreground: "#f3ba9c"}
  other_read:         {foreground: "#9c8d93"}
  other_write:        {foreground: "#dfbecd"}
  other_execute:      {foreground: "#f3ba9c"}
  special_user_file:  {foreground: "#fbb1d8"}
  special_other:      {foreground: "#9c8d93"}
  attribute:          {foreground: "#dfbecd"}

size:
  major:       {foreground: "#9c8d93"}
  minor:       {foreground: "#9c8d93"}
  number_byte: {foreground: "#d3c2c9"}
  number_kilo: {foreground: "#dfbecd"}
  number_mega: {foreground: "#fbb1d8"}
  number_giga: {foreground: "#ffb4ab"}
  number_huge: {foreground: "#ffb4ab"}
  unit_byte:   {foreground: "#9c8d93"}
  unit_kilo:   {foreground: "#9c8d93"}
  unit_mega:   {foreground: "#9c8d93"}
  unit_giga:   {foreground: "#9c8d93"}
  unit_huge:   {foreground: "#9c8d93"}

users:
  user_you:    {foreground: "#fbb1d8"}
  user_root:   {foreground: "#ffb4ab"}
  user_other:  {foreground: "#9c8d93"}
  group_yours: {foreground: "#dfbecd"}
  group_other: {foreground: "#9c8d93"}
  group_root:  {foreground: "#ffb4ab"}

links:
  normal:          {foreground: "#f3ba9c"}
  multi_link_file: {foreground: "#dfbecd"}

git:
  new:        {foreground: "#f3ba9c"}
  modified:   {foreground: "#dfbecd"}
  deleted:    {foreground: "#ffb4ab"}
  renamed:    {foreground: "#fbb1d8"}
  typechange: {foreground: "#dfbecd"}
  ignored:    {foreground: "#9c8d93"}
  conflicted: {foreground: "#ffb4ab"}

git_repo:
  branch_main:  {foreground: "#fbb1d8"}
  branch_other: {foreground: "#dfbecd"}
  git_clean:    {foreground: "#9c8d93"}
  git_dirty:    {foreground: "#f3ba9c"}

security_context:
  colon: {foreground: "#9c8d93"}
  user:  {foreground: "#9c8d93"}
  role:  {foreground: "#9c8d93"}
  typ:   {foreground: "#9c8d93"}
  range: {foreground: "#9c8d93"}

file_type:
  image:      {foreground: "#f3ba9c"}
  video:      {foreground: "#fbb1d8"}
  music:      {foreground: "#dfbecd"}
  lossless:   {foreground: "#dfbecd"}
  crypto:     {foreground: "#ffb4ab"}
  document:   {foreground: "#d3c2c9"}
  compressed: {foreground: "#dfbecd"}
  temp:       {foreground: "#9c8d93"}
  compiled:   {foreground: "#9c8d93"}
  build:      {foreground: "#f3ba9c"}
  source:     {foreground: "#d3c2c9"}

punctuation:          {foreground: "#9c8d93"}
date:                 {foreground: "#9c8d93"}
inode:                {foreground: "#9c8d93"}
blocks:               {foreground: "#9c8d93"}
header:               {foreground: "#fbb1d8"}
octal:                {foreground: "#9c8d93"}
flags:                {foreground: "#9c8d93"}
symlink_path:         {foreground: "#f3ba9c"}
control_char:         {foreground: "#9c8d93"}
broken_symlink:       {foreground: "#ffb4ab"}
broken_path_overlay:  {foreground: "#9c8d93"}
