"$schema" = "https://yazi-rs.github.io/schemas/keymap.json"

[[mgr.prepend_keymap]]
on   = ["<Right>"]
run  = "plugin smart-enter"
desc = "Smart enter: dir → cd in, file → open"

[[mgr.prepend_keymap]]
on   = ["<Left>"]
run  = "leave"
desc = "Go to parent directory"

[[mgr.prepend_keymap]]
on = [ "g", "d" ]
run = "cd ~/Downloads"
desc = "Cd to ~/Downloads"

[[mgr.prepend_keymap]]
on = [ "g", "v" ]
run = "cd ~/Videos/"
desc = "Cd to ~/Videos"

[[mgr.prepend_keymap]]
on = [ "g", "p" ]
run = "cd ~/Pictures"
desc = "Cd to ~/Pictures"

[[mgr.prepend_keymap]]
on = [ "g", "." ]
run = "cd ~/.config/"
desc = "Cd to Config"

[[mgr.prepend_keymap]]
on = [ "g", "m" ]
run = "cd ~/Music"
desc = "Cd to ~/Music"

[[mgr.prepend_keymap]]
on = [ "g", "r" ]
run = "cd ~/Manga"
desc = "Cd to ~/Manga"

[[mgr.prepend_keymap]]
on = "S"
run = 'shell "$SHELL" --block --confirm'
desc = "Open shell here"

[[mgr.prepend_keymap]]
on = [ "c", "a" ]
run = "plugin compress"
desc = "Archive selected files"

[[mgr.prepend_keymap]]
on = [ "c", "e" ]
run = "shell --block -- 7z x \"$@\" -o."
desc = "Extract selected archive(s) with 7z"

[[mgr.prepend_keymap]]
on = [ "c", "C"]
run = "shell --confirm -- ~/Scripts/manga-compress.sh %s"
desc = "Compress manga with MozJPEG"

[[mgr.prepend_keymap]]
on   = ["M"]
run  = "plugin mount"
desc = "Mount manager (USB / ISO / drives)"

