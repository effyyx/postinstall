confirm-before-quit = false

[renderer]
performance = "High" 
backend = "Automatic"

[window]
width = 800
height = 600
decorations = "Disabled"
blur = false
opacity = 1.0

[fonts]
size = 16
family = "Hiragino Sans"
use-drawable-chars = true 

[cursor]
blinking = false
shape = 'block'

[navigation]
mode = "Plain"

[colors]
background = "{{colors.surface.default.hex}}"
foreground = "{{colors.on_surface.default.hex}}"
cursor = "{{colors.primary.default.hex}}"
selection-background = "{{colors.secondary_container.default.hex}}"
selection-foreground = "{{colors.on_secondary_container.default.hex}}"

# ANSI Colors
black = "{{colors.surface_variant.default.hex}}"
red = "{{colors.error.default.hex}}"
green = "{{colors.primary.default.hex}}"
yellow = "{{colors.tertiary.default.hex}}"
blue = "{{colors.secondary.default.hex}}"
magenta = "{{colors.primary_container.default.hex}}"
cyan = "{{colors.outline.default.hex}}"
white = "{{colors.on_surface_variant.default.hex}}"
